name: Deploy numbl project to GitHub Pages

# Bundles this numbl project with the browser IDE and publishes it to GitHub
# Pages on every push to main.
#
# One-time setup: Settings → Pages → "Build and deployment" → Source →
# "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: flatironinstitute/numbl/.github/actions/build-site@main
        with:
          project-dir: .
          # Build numbl from the main branch (development version) rather than
          # the published npm release
          numbl-ref: main

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
